# Railway deploy config for the Loreforge WebSocket sync server (#14).
# Run from the repo root (monorepo). Railway injects PORT; the server reads it.
# Required env: SUPABASE_JWT_SECRET (verifies Supabase session tokens on connect).
[build]
builder = "NIXPACKS"
# tsx runs the TypeScript entrypoint directly — nothing to compile. A no-op
# build avoids Nixpacks re-running `npm ci` (which collides with the cached
# node_modules/.cache mount → EBUSY) and avoids the root `npm run build`
# default (which would build the Next.js web app on the wrong service).
buildCommand = "echo no build needed"

[deploy]
startCommand = "npm run start -w @app/ws-server"
healthcheckPath = "/health"
restartPolicyType = "ON_FAILURE"
